<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Graphs | PBS Tools</title>
    <link rel="icon" type="image/x-icon" href="src/favicon.ico">
	<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
	<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.3/dist/semantic.min.css">
	<script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.3/dist/semantic.min.js"></script>
  <script src="https://d3js.org/d3.v6.js"></script>

</head>
<body>

    <div class="ui centered fluid wrapping menu">
		<a class="ui item header" href="index.html">
			<img class="ui mini spaced image" src="src/icon.png">
			<span>PBS Tools</span>
		</a>
		
		<a class="active item" href="Graphs.html">Public Graphs</a>
		
	</div>

    <div class="ui container segment basic">

        <div class="ui yellow styled fluid accordion">
            <div class="title">
                <i class="dropdown icon"></i>
               Notes
            </div>
            <div class="content">
                <p>The graphs shown on this page <strong>only</strong> use publically available data. They're also generated using R code, so they're pretty janky.</p> 

            </div>
        </div>
    </div>

<div class="ui center aligned container piled segment">
    <h4 class="ui header">PBS / RPBS dispensings, per ATC level, per year</h4>
    <div id="PBSATC"></div>
</div>

<div class="ui center aligned container piled segment">
    <h4 class="ui header">PBS / RPBS dispensings, per ATC level, per year</h4>
    <div id="heatmap"></div>
</div>

<script>
// set the dimensions and margins of the graph
const margin = {top: 20, right: 30, bottom: 0, left: 10},
    width = 460 - margin.left - margin.right,
    height = 400 - margin.top - margin.bottom;

// append the svg object to the body of the page
const svg = d3.select("#PBSATC")
  .append("svg")
    .attr("width", width + margin.left + margin.right)
    .attr("height", height + margin.top + margin.bottom)
  .append("g")
    .attr("transform",
          `translate(${margin.left}, ${margin.top})`);

// Parse the Data
d3.csv("src/PBS Yearly Percentage - By ATC.csv").then(function(data) {

  // List of groups = header of the csv files
  const keys = d3.union(data.map(d => d.ATC))

  // Add X axis
  const x = d3.scaleLinear()
    .domain(d3.extent(data, function(d) { return d.Year; }))
    .range([ 0, width ]);
    console.log(x);
  svg.append("g")
    .attr("transform", `translate(0, ${height*0.8})`)
    .call(d3.axisBottom(x).tickSize(-height*.7).tickValues([1992, 1996, 2000, 2004, 2008, 2012, 2016, 2020, 2024]))
    .select(".domain").remove()
  // Customization
  svg.selectAll(".tick line").attr("stroke", "#b8b8b8")

  // Add X axis label:
  svg.append("text")
      .attr("text-anchor", "end")
      .attr("x", width)
      .attr("y", height-30 )
      .text("Time (year)");

  // Add Y axis
 
  const y = d3.scaleLinear()
    .domain([0, 100000000])
    .range([height/3, 0]);
  svg.append("g")
    .call(d3.axisLeft(y))
    .select(".domain").remove();

  // color palette
  const color = d3.scaleOrdinal()
    .domain(keys)
    .range(d3.schemeDark2);

  //stack the data?

    const stackedData = d3.stack()
    .offset(d3.stackOffsetSilhouette)
    .keys(d3.union(data.map(d => d.ATC)))
    .value(([, group], key) => group.get(key).Services)
    (d3.index(data, d => d.Year, d => d.ATC));  

  console.log(stackedData)

  // create a tooltip
  const Tooltip = svg
    .append("text")
    .attr("x", 0)
    .attr("y", 0)
    .style("opacity", 0)
    .style("font-size", 17)

  // Three function that change the tooltip when user hover / move / leave a cell
  const mouseover = function(event,d) {
    Tooltip.style("opacity", 1)
    d3.selectAll(".myArea").style("opacity", .2)
    d3.select(this)
      .style("stroke", "black")
      .style("opacity", 1)
  }
  const mousemove = function(event,d,i) {
    grp = d.key
    Tooltip.text("ATC: " + grp)
    console.log(d)
  }
  const mouseleave = function(event,d) {
    Tooltip.style("opacity", 0)
    d3.selectAll(".myArea").style("opacity", 1).style("stroke", "none")
   }

  // Area generator
  const area = d3.area()
    .x(function(d) { return x(d.data[0]); })
    .y0(function(d) { return y(d[0]); })
    .y1(function(d) { return y(d[1]); })

  // Show the areas
  svg
    .selectAll("mylayers")
    .data(stackedData)
    .join("path")
      .attr("class", "myArea")
      .style("fill", function(d) { return color(d.key); })
      .attr("d", area)
      .on("mouseover", mouseover)
      .on("mousemove", mousemove)
      .on("mouseleave", mouseleave)

})
</script>

<script>
// set the dimensions and margins of the graph
const margin1 = {top: 20, right: 30, bottom: 40, left: 40},
    width1 = 460 - margin.left - margin.right,
    height1 = 400 - margin.top - margin.bottom;

// append the svg object to the body of the page
const svg1 = d3.select("#heatmap")
  .append("svg")
    .attr("width", width1 + margin1.left + margin1.right)
    .attr("height", height1 + margin1.top + margin1.bottom)
  .append("g")
    .attr("transform",
          `translate(${margin1.left}, ${margin1.top})`);

// Parse the Data
d3.csv("src/PBS Yearly Percentage - By ATC.csv").then(function(data) {

var myGroups = d3.union(data.map(d => d.ATC));
  var myVars = d3.union(data.map(d => d.Year));
  
  // Build X scales and axis:
  var x = d3.scaleBand()
    .range([ 0, width1 ])
    .domain(myGroups)
    .padding(0.05);
  svg1.append("g")
    .style("font-size", 15)
    .attr("transform", "translate(0," + height1 + ")")
    .call(d3.axisBottom(x).tickSize(0))
    .select(".domain").remove()

  // Build Y scales and axis:
  var y = d3.scaleBand()
    .range([ height1, 0 ])
    .domain(myVars)
    .padding(0.05);
  svg1.append("g")
    .style("font-size", 15)
    .call(d3.axisLeft(y).tickSize(0))
    .select(".domain").remove()

  // Build color scale
  var myColor = d3.scaleSequential()
    .interpolator(d3.interpolateInferno)
    .domain([0,0.1])

  // create a tooltip
  var Tooltip = d3.select("#heatmap")
    .append("div")
    .style("opacity", 0)
    .attr("class", "tooltip")
    .style("background-color", "white")
    .style("border", "solid")
    .style("border-width", "2px")
    .style("border-radius", "5px")
    .style("padding", "5px")

  // Three function that change the tooltip when user hover / move / leave a cell
  var mouseover = function(d) {
    Tooltip
      .style("opacity", 1)
    d3.select(this)
      .style("stroke", "black")
      .style("opacity", 1)
  }
  var mousemove = function(d) {
    Tooltip
      .html("The exact value of<br>this cell is: " + d.target.__data__.Percentage)
      .style("left", (d3.pointer(this)[0]+70) + "px")
      .style("top", (d3.pointer(this)[1]) + "px")
  }
  var mouseleave = function(d) {
    Tooltip
      .style("opacity", 0)
    d3.select(this)
      .style("stroke", "none")
      .style("opacity", 0.8)
  }


  // add the squares
  svg1.selectAll()
    .data(data, function(d) {return d.ATC+':'+d.Year;})
    .enter()
    .append("rect")
      .attr("x", function(d) { return x(d.ATC) })
      .attr("y", function(d) { return y(d.Year) })
      .attr("rx", 4)
      .attr("ry", 4)
      .attr("width", x.bandwidth() )
      .attr("height", y.bandwidth() )
      .style("fill", function(d) { console.log(d); return myColor(d.Percentage)} )
      .style("stroke-width", 4)
      .style("stroke", "none")
      .style("opacity", 0.8)
    .on("mouseover", mouseover)
    .on("mousemove", mousemove)
    .on("mouseleave", mouseleave)
})
</script>

<script>

    $('.ui.accordion')
        .accordion()
    ;
</script>

</body>
</html>
